  <div class="app-bg"></div>

  <div class="wrap">
    <div class="hdr">
      <div class="hdr-eye">⛳ &nbsp; Personal Golf Tracker</div>

<script>
// ── helpers ──────────────────────────────────────────────────────────────────
const WHS = {3:[1,-2],4:[1,-1],5:[1,0],6:[2,-1],7:[2,0],8:[2,0],9:[3,0],10:[3,0],11:[3,0],12:[4,0],13:[4,0],14:[4,0],15:[5,0],16:[5,0],17:[6,0],18:[6,0],19:[7,0],20:[8,0]};
const DEFAULT_PARS = [4,4,3,5,4,3,4,5,4,4,3,5,4,4,3,5,4,4];

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2); }
function fmtD(d){ return new Date(d+'T00:00:00').toLocaleDateString('en-ZA',{day:'numeric',month:'short',year:'numeric'}); }
function fmtDW(d){ return new Date(d+'T00:00:00').toLocaleDateString('en-ZA',{weekday:'short',day:'numeric',month:'short',year:'numeric'}); }

// Build onclick string safely - avoids all quote escaping issues
function oc(fn, id){ return 'onclick="'+fn+'(\''+id+'\')"'; }
function oc2(fn, id, arg2){ return 'onclick="'+fn+'(\''+id+'\',\''+arg2+'\')"'; }

function sClass(s,p){var d=s-p;if(d<=-2)return'eagle';if(d===-1)return'birdie';if(d===0)return'par-sc';if(d===1)return'bogey';if(d===2)return'double';return'worse';}

function calcHandicapDetail(rounds){
  if(rounds.length<3) return {hcp:null,usedIds:[],rule:[0,0],n:0,exceptionalRounds:[],totalAdj:0,lowHI:null,capApplied:null};
  var n=Math.min(rounds.length,20), rule=WHS[n];
  if(!rule) return {hcp:null,usedIds:[],rule:[0,0],n:n,exceptionalRounds:[],totalAdj:0,lowHI:null,capApplied:null};
  var recent=[].concat(rounds).sort(function(a,b){return new Date(b.date)-new Date(a.date);}).slice(0,20);

  // Exceptional score adjustments
  var totalAdj=recent.reduce(function(s,r){return s+(r.exceptionAdj||0);},0);
  var exceptionalRounds=recent.filter(function(r){return (r.exceptionAdj||0)!==0;});

  // Apply adjustments and rank
  var adjusted=recent.map(function(r){
    return {id:r.id,adjDiff:r.differential+totalAdj,differential:r.differential,exceptionAdj:r.exceptionAdj||0};
  });
  var ranked=adjusted.slice().sort(function(a,b){return a.adjDiff-b.adjDiff;});
  var used=ranked.slice(0,rule[0]);
  var usedIds=used.map(function(r){return r.id;});
  var avg=used.reduce(function(s,r){return s+r.adjDiff;},0)/used.length;
  var rawHcp=avg+rule[1]; // unrounded, pre-cap

  // ── Low Handicap Index: lowest index in past 365 days ──────────────────
  // We approximate by finding the lowest calculated index from any rolling
  // window of the scoring record within 365 days of the most recent round.
  // Simpler practical approach: store lowHI on S, recalculate as min over rounds.
  // We calculate it as the lowest the index would have been at any point.
  // For performance we use: lowest of (best differential seen so far - rule adj).
  // Full recalc: sort all rounds by date, compute HI at each point, take min.
  var lowHI = null;
  if(rounds.length>=3){
    var byDate=[].concat(rounds).sort(function(a,b){return new Date(a.date)-new Date(b.date);});
    var oneYearAgo=new Date(byDate[byDate.length-1].date+'T00:00:00');
    oneYearAgo.setFullYear(oneYearAgo.getFullYear()-1);
    for(var i=2;i<byDate.length;i++){
      var slice=byDate.slice(0,i+1);
      var sliceN=Math.min(slice.length,20);
      var sliceRule=WHS[sliceN]; if(!sliceRule) continue;
      var sliceRecent=[].concat(slice).sort(function(a,b){return new Date(b.date)-new Date(a.date);}).slice(0,20);
      var sliceAdj=sliceRecent.reduce(function(s,r){return s+(r.exceptionAdj||0);},0);
      var sliceRanked=sliceRecent.slice().sort(function(a,b){return (a.differential+sliceAdj)-(b.differential+sliceAdj);});
      var sliceUsed=sliceRanked.slice(0,sliceRule[0]);
      var sliceAvg=sliceUsed.reduce(function(s,r){return s+(r.differential+sliceAdj);},0)/sliceUsed.length;
      var sliceHcp=Math.round((sliceAvg+sliceRule[1])*10)/10;
      // Only consider rounds within the 365-day window of the latest round
      var roundDate=new Date(byDate[i].date+'T00:00:00');
      if(roundDate>=oneYearAgo){
        if(lowHI===null||sliceHcp<lowHI) lowHI=sliceHcp;
      }
    }
    // Also consider current calculation
    var currentPre=Math.round(rawHcp*10)/10;
    if(lowHI===null||currentPre<lowHI) lowHI=currentPre;
  }

  // ── Soft Cap / Hard Cap ─────────────────────────────────────────────────
  var capApplied=null;
  var cappedHcp=rawHcp;
  if(lowHI!==null){
    var rise=rawHcp-lowHI;
    if(rise>5){
      cappedHcp=lowHI+5;
      capApplied='hard';
    } else if(rise>3){
      // Soft cap: allow first 3 fully, then 50% of remainder
      cappedHcp=lowHI+3+(rise-3)*0.5;
      capApplied='soft';
    }
  }

  var hcp=Math.round(cappedHcp*10)/10;
  return {hcp:hcp,usedIds:usedIds,rule:rule,n:n,exceptionalRounds:exceptionalRounds,
    totalAdj:totalAdj,adjustedMap:adjusted,lowHI:lowHI,capApplied:capApplied,rawHcp:Math.round(rawHcp*10)/10};
}

function calcHandicap(rounds){
  return calcHandicapDetail(rounds).hcp;
}
function getBestScores(rounds){
  var best18=null, best9=null;
  rounds.forEach(function(r){
    var is9=(r.numHoles||18)===9;
    if(!is9){
      if(!best18||r.grossScore<best18.score) best18={score:r.grossScore,round:r};
      var front=r.holeScores.slice(0,9).reduce(function(a,b){return a+b;},0);
      var back=r.holeScores.slice(9,18).reduce(function(a,b){return a+b;},0);
      if(!best9||front<best9.score) best9={score:front,round:r,half:0,label:'Front 9'};
      if(!best9||back<best9.score)  best9={score:back, round:r,half:1,label:'Back 9'};
    } else {
      if(!best9||r.grossScore<best9.score) best9={score:r.grossScore,round:r,half:r.half,label:(r.half===0?'Front 9':'Back 9')};
    }
  });
  return {best18:best18,best9:best9};
}

function goToScorecard(id){
  var r=S.rounds.find(function(r){return r.id===id;}); if(!r)return;
  var course=S.courses.find(function(c){return c.id===r.courseId;});
  var holes=course?course.holes:r.holePars.map(function(par,i){return {par:par,distance:(r.holeDistances||[])[i]||0,si:i+1};});
  var d=r.grossScore-r.totalPar;
  var dCol=d<0?'#4094dc':d===0?'#5a8068':'#dc7846';
  var html='<div class="modal-t">'+esc(r.courseName)+'<button class="btn-ghost btn" style="font-size:1.1rem;padding:4px 8px" onclick="closeModal()">✕</button></div>';
  html+='<div style="font-size:.7rem;color:#5a8068;margin-bottom:16px">'+fmtDW(r.date)+' · CR '+r.courseRating+' / SR '+r.slopeRating+(r.numHoles===9?' · '+(r.half===0?'Front 9':'Back 9'):'')+' </div>';
  // summary strip
  html+='<div style="display:flex;gap:16px;justify-content:center;background:rgba(0,0,0,.2);border-radius:10px;padding:14px 16px;margin-bottom:16px;flex-wrap:wrap">';
  var items=[
    {v:r.grossScore,l:'Score',c:'#ede8dc'},
    {v:r.totalPar,l:'Par',c:'#5a8068'},
    {v:d===0?'E':d>0?'+'+d:d,l:'vs Par',c:dCol},
    {v:(r.differential>0?'+':'')+r.differential,l:'Differential',c:'#c9a84c'}
  ];
  items.forEach(function(item){
    html+='<div style="text-align:center"><div style="font-family:Cormorant Garamond,serif;font-size:1.5rem;font-weight:600;color:'+item.c+'">'+item.v+'</div>'
      +'<div style="font-size:.58rem;color:#3a5642;text-transform:uppercase;letter-spacing:.1em">'+item.l+'</div></div>';
  });
  html+='</div>';
  // scorecard table
  if(r.numHoles===9){
    html+=buildHalfTable(r.half||0,holes,'view',r.holeScores);
  } else {
    html+=buildHalfTable(0,holes,'view',r.holeScores);
    html+=buildHalfTable(1,holes,'view',r.holeScores);
  }
  html+='<div style="display:flex;justify-content:flex-end;margin-top:16px">';
  html+='<button class="btn btn-ghost" onclick="closeModal()">Close</button></div>';
  document.getElementById('modal-box').innerHTML=html;
  document.getElementById('modal-overlay').classList.add('open');
}

// ── SCORECARD TABLE ───────────────────────────────────────────────────────────
function buildHalfTable(half, holes, mode, scores){
  var sl=half*9, hs=holes.slice(sl,sl+9);
  var parOut=hs.reduce(function(a,h){return a+h.par;},0);
  var distOut=hs.reduce(function(a,h){return a+(h.distance||0);},0);
  var label=half===0?'OUT':'IN';
  var html='<div class="half-lbl">'+(half===0?'Front 9':'Back 9')+'</div><div class="sc-wrap"><table class="sc-t">';
  html+='<thead><tr><th class="lc">Hole</th>';
  hs.forEach(function(_,i){ html+='<th class="hnum">'+(sl+i+1)+'</th>'; });
  html+='<th class="tot">'+label+'</th></tr></thead><tbody>';
  // par row
  html+='<tr><td class="lc">Par</td>';
  hs.forEach(function(h,i){
    if(mode==='edit-course'){
      html+='<td><select class="par-sel" onchange="setCHole('+(sl+i)+',\'par\',this.value)">';
      [3,4,5].forEach(function(v){ html+='<option value="'+v+'"'+(h.par===v?' selected':'')+'>'+v+'</option>'; });
      html+='</select></td>';
    } else {
      html+='<td style="color:#9abfaa">'+h.par+'</td>';
    }
  });
  html+='<td class="tot" id="cf-par-'+half+'">'+parOut+'</td></tr>';
  // dist row
  if(distOut>0||mode==='edit-course'){
    html+='<tr><td class="lc">Dist (m)</td>';
    hs.forEach(function(h,i){
      if(mode==='edit-course'){
        html+='<td><input class="di-inp" type="number" value="'+(h.distance||'')+'" onblur="setCHole('+(sl+i)+',\'distance\',this.value)" placeholder="0"></td>';
      } else {
        html+='<td style="color:#5a8068;font-size:.66rem">'+(h.distance||'—')+'</td>';
      }
    });
    html+='<td class="tot" id="cf-dist-'+half+'" style="font-size:.74rem">'+(distOut?distOut+'m':'—')+'</td></tr>';
  }
  // SI row
  html+='<tr><td class="lc">SI</td>';
  hs.forEach(function(h,i){
    if(mode==='edit-course'){
      html+='<td><input class="si-inp" type="number" min="1" max="18" value="'+(h.si||sl+i+1)+'" onblur="setCHole('+(sl+i)+',\'si\',this.value)"></td>';
    } else {
      html+='<td style="color:#3a5642">'+(h.si||sl+i+1)+'</td>';
    }
  });
  html+='<td class="tot" style="color:#3a5642">—</td></tr>';
  // score row (round entry)
  if(mode==='edit-round'&&RF){
    var sc=RF.scores.slice(sl,sl+9);
    var st=sc.reduce(function(a,s){return a+(parseInt(s)||0);},0);
    var vt=st-parOut;
    html+='<tr><td class="lc" style="color:#c9a84c">Score</td>';
    sc.forEach(function(s,i){
      html+='<td><input id="rsi-'+(sl+i)+'" class="sc-inp" type="number" min="1" max="15" value="'+esc(s)+'" oninput="setRS('+(sl+i)+',this.value)" placeholder="—"'+(s?' style="border-color:rgba(201,168,76,.3)"':'')+' ></td>';
    });
    html+='<td class="tot" id="sc-tot-'+half+'">'+(st||'—')+'</td></tr>';
    html+='<tr><td class="lc">+/−</td>';
    sc.forEach(function(s,i){
      var d=(parseInt(s)||0)-hs[i].par;
      html+='<td id="vs-'+(sl+i)+'" class="'+(s?(d<0?'vs-neg':d>0?'vs-pos':'vs-ev'):'vs-ev')+'">'+(s?(d===0?'E':d>0?'+'+d:d):'—')+'</td>';
    });
    html+='<td class="tot" id="vs-tot-'+half+'" style="font-size:.72rem;color:'+(vt<0?'#4094dc':vt===0?'#5a8068':'#dc7846')+'">'+
      (sc.some(function(s){return s;})?(vt===0?'E':vt>0?'+'+vt:vt):'—')+'</td></tr>';
  }
  // score row (view)
  if(mode==='view'&&scores){
    var sc2=scores.slice(sl,sl+9);
    var st2=sc2.reduce(function(a,s){return a+(s||0);},0);
    var vt2=st2-parOut;
    html+='<tr><td class="lc" style="color:#c9a84c">Score</td>';
    sc2.forEach(function(s,i){
      html+='<td>'+(s?'<span class="sb '+sClass(s,hs[i].par)+'">'+s+'</span>':'<span style="color:#3a5642">—</span>')+'</td>';
    });
    html+='<td class="tot">'+(st2||'—')+'</td></tr>';
    if(sc2.some(function(s){return s;})){
      html+='<tr><td class="lc">+/−</td>';
      sc2.forEach(function(s,i){
        var d=(s||0)-hs[i].par;
        html+='<td class="'+(s?(d<0?'vs-neg':d>0?'vs-pos':'vs-ev'):'vs-ev')+'">'+(s?(d===0?'E':d>0?'+'+d:d):'—')+'</td>';
      });
      html+='<td class="tot" style="font-size:.72rem;color:'+(vt2<0?'#4094dc':vt2===0?'#5a8068':'#dc7846')+'">'+
        (vt2===0?'E':vt2>0?'+'+vt2:vt2)+'</td></tr>';
    }
  }
  html+='</tbody></table></div>';
  return html;
}

          html+='</div>';
          html+='<div style="font-size:.56rem;color:#3a5642;margin-top:2px">P'+h.par+'</div>';
          html+='</div>';
        });
        html+='</div>';
      });
      // worst 3 holes summary
      var played=holeData.filter(function(h){return h.avg!==null;});
      if(played.length){
        var worst=played.slice().sort(function(a,b){return (b.avg-b.par)-(a.avg-a.par);}).slice(0,3);
        var best=played.slice().sort(function(a,b){return (a.avg-a.par)-(b.avg-b.par);}).slice(0,3);
        html+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px">';
        html+='<div style="background:rgba(200,55,55,.07);border:1px solid rgba(200,55,55,.2);border-radius:10px;padding:10px 12px">';
        html+='<div style="font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:#e06060;margin-bottom:6px">Hardest holes</div>';
        worst.forEach(function(h){
          html+='<div style="display:flex;justify-content:space-between;font-size:.76rem;padding:2px 0">';
          html+='<span style="color:#9abfaa">Hole '+h.hole+' (Par '+h.par+')</span>';
          html+='<span style="color:#e06060;font-weight:600">'+h.avg.toFixed(1)+' avg</span></div>';
        });
        html+='</div>';
        html+='<div style="background:rgba(70,190,110,.07);border:1px solid rgba(70,190,110,.2);border-radius:10px;padding:10px 12px">';
        html+='<div style="font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:#46be6e;margin-bottom:6px">Best holes</div>';
        best.forEach(function(h){
          html+='<div style="display:flex;justify-content:space-between;font-size:.76rem;padding:2px 0">';
          html+='<span style="color:#9abfaa">Hole '+h.hole+' (Par '+h.par+')</span>';
          html+='<span style="color:#46be6e;font-weight:600">'+h.avg.toFixed(1)+' avg</span></div>';
        });
        html+='</div>';
        html+='</div>';
      }
      html+='</div>';
    } else if(isHotOpen&&!cr.length){
      html+='<div style="margin-top:12px;padding:10px 0;font-size:.8rem;color:#3a5642">No rounds recorded for this course yet.</div>';
    }
    html+='<div class="xrow" onclick="S.expandedHotZone=S.expandedHotZone===\''+c.id+'\'?null:\''+c.id+'\';render()">';
    html+='<span class="xlbl">'+(isHotOpen?'Hide':'View')+' hole averages</span>';
    html+='<span style="color:#3a5642;font-size:.8rem">'+(isHotOpen?'▲':'▼')+'</span></div>';
    // layout
    if(isOpen){
      html+='<div style="margin-top:14px">'+buildHalfTable(0,c.holes,'view-course',null)+buildHalfTable(1,c.holes,'view-course',null)+'</div>';
    }
    html+='<div class="xrow" onclick="S.expandedCourse=S.expandedCourse===\''+c.id+'\'?null:\''+c.id+'\';render()">';
    html+='<span class="xlbl">'+(isOpen?'Hide':'View')+' course layout</span>';
    html+='<span style="color:#3a5642;font-size:.8rem">'+(isOpen?'▲':'▼')+'</span></div>';
    html+='</div>';
  });
  return html;
}

// ── HANDICAP TAB ──────────────────────────────────────────────────────────────
function buildHandicap(){
  var detail=calcHandicapDetail(S.rounds);
  var hcp=detail.hcp;
  var usedIds=detail.usedIds||[];
  var html='<div class="hcp-hero"><div class="hcp-lbl">World Handicap Index</div>';
  html+='<div class="hcp-val">'+(hcp!==null?hcp:'—')+'</div>';
  var note=hcp!==null
    ?('Best '+detail.rule[0]+' of last '+Math.min(S.rounds.length,20)+' differentials · WHS'
      +(detail.capApplied==='hard'?' · Hard cap applied':detail.capApplied==='soft'?' · Soft cap applied':''))
    :S.rounds.length<3
      ?('Add '+(3-S.rounds.length)+' more round'+(3-S.rounds.length!==1?'s':'')+' to calculate your handicap')
      :'Add rounds to begin';
  html+='<div class="hcp-note">'+note+'</div></div>';
  if(!S.rounds.length) return html+'<div class="card"><div class="empty"><div class="empty-i">📊</div><div class="empty-t">No rounds yet.</div></div></div>';

  // Stats
  var totalNines=S.rounds.reduce(function(a,r){return a+(r.numHoles===9?1:2);},0);
  var totalShots=S.rounds.reduce(function(a,r){return a+r.grossScore;},0);
  var avg9=(totalNines>0?(totalShots/totalNines).toFixed(1):'—');
  html+='<div class="stats">';
  html+='<div class="stat"><div class="stat-v">'+S.rounds.length+'</div><div class="stat-l">Rounds</div></div>';
  html+='<div class="stat"><div class="stat-v">'+avg9+'</div><div class="stat-l">Scoring Avg (9)</div></div>';
  if(detail.lowHI!==null) html+='<div class="stat"><div class="stat-v">'+detail.lowHI+'</div><div class="stat-l">Low HI (1yr)</div></div>';
  html+='</div>';

  // ── Calculation breakdown dropdown ──────────────────────────────────────
  if(hcp!==null){
    var isCalcOpen=S.showHcpCalc;
    html+='<div class="card card-gold" style="margin-bottom:20px">';
    html+='<div style="display:flex;justify-content:space-between;align-items:center;cursor:pointer" onclick="S.showHcpCalc=!S.showHcpCalc;render()">';
    html+='<div style="font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:#c9a84c">How it is calculated</div>';
    html+='<span style="color:#c9a84c;font-size:.85rem">'+(isCalcOpen?'▲':'▼')+'</span></div>';
    if(isCalcOpen){
      var recent=[].concat(S.rounds).sort(function(a,b){return new Date(b.date)-new Date(a.date);}).slice(0,20);
      var ranked=recent.slice().sort(function(a,b){return a.differential-b.differential;});
      var used=ranked.slice(0,detail.rule[0]);
      var avgDiff=used.reduce(function(s,r){return s+r.differential;},0)/used.length;

      html+='<div style="margin-top:14px;font-size:.78rem;color:#9abfaa;line-height:1.8">';

      // Step 1
      html+='<div style="margin-bottom:12px">';
      html+='<div style="font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:#4a7055;margin-bottom:6px">Step 1 — Score Differentials</div>';
      html+='<div style="color:#5a8068;font-size:.73rem;margin-bottom:8px">(Gross Score − Course Rating) × 113 ÷ Slope Rating</div>';
      used.forEach(function(r){
        var adjDiff=r.differential+(detail.totalAdj||0);
        var isExcept=(r.exceptionAdj||0)!==0;
        html+='<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.04)">';
        html+='<span style="color:#9abfaa">'+esc(r.courseName)+' · '+fmtD(r.date)+(isExcept?' ⚡':'')+'</span>';
        html+='<span style="color:#c9a84c;font-weight:600">'+(adjDiff>0?'+':'')+Math.round(adjDiff*10)/10+'</span>';
        html+='</div>';
      });
      if(detail.totalAdj&&detail.totalAdj!==0){
        html+='<div style="font-size:.68rem;color:#4094dc;margin-top:6px">⚡ Exceptional score adjustment of '+detail.totalAdj+' applied to all differentials</div>';
      }
      html+='</div>';

      // Step 2
      html+='<div style="margin-bottom:12px">';
      html+='<div style="font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:#4a7055;margin-bottom:6px">Step 2 — Average the Best '+detail.rule[0]+'</div>';
      var sumStr=used.map(function(r){return r.differential;}).join(' + ');
      html+='<div style="background:rgba(0,0,0,.2);border-radius:8px;padding:10px 12px">';
      html+='<div style="color:#5a8068;font-size:.72rem;margin-bottom:4px">('+sumStr+') ÷ '+used.length+'</div>';
      html+='<div style="font-family:Cormorant Garamond,serif;font-size:1.3rem;color:#ede8dc">= '+avgDiff.toFixed(3)+'</div>';
      html+='</div></div>';

      // Step 3 — small-sample adjustment (only for <7 rounds)
      if(detail.rule[1]!==0){
        html+='<div style="margin-bottom:12px">';
        html+='<div style="font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:#4a7055;margin-bottom:6px">Step 3 — Small Sample Adjustment</div>';
        html+='<div style="color:#5a8068;font-size:.73rem;margin-bottom:8px">Applied when you have fewer than 7 rounds — pulls index down slightly because a small sample tends to overrepresent your best play.</div>';
        html+='<div style="background:rgba(0,0,0,.2);border-radius:8px;padding:10px 12px">';
        html+='<div style="color:#5a8068;font-size:.72rem;margin-bottom:4px">'+avgDiff.toFixed(3)+' + ('+detail.rule[1]+')</div>';
        html+='<div style="font-family:Cormorant Garamond,serif;font-size:1.3rem;color:#ede8dc">= '+(avgDiff+detail.rule[1]).toFixed(3)+'</div>';
        html+='</div></div>';
      }

      // Soft/Hard cap step (only show if active)
      if(detail.capApplied){
        html+='<div style="margin-bottom:12px">';
        var capLabel=detail.capApplied==='hard'?'Hard Cap (Low HI + 5.0)':'Soft Cap (Low HI + 3 + 50% remainder)';
        html+='<div style="font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:'+(detail.capApplied==='hard'?'#dc7846':'#c9a84c')+';margin-bottom:6px">'+capLabel+'</div>';
        html+='<div style="color:#5a8068;font-size:.73rem;margin-bottom:8px">Your Low HI is '+detail.lowHI+'. Uncapped index would be '+detail.rawHcp+', which is '+(detail.rawHcp-detail.lowHI).toFixed(1)+' above your Low HI.</div>';
        html+='<div style="background:rgba(0,0,0,.2);border-radius:8px;padding:10px 12px">';
        html+='<div style="color:#5a8068;font-size:.72rem;margin-bottom:4px">Capped at '+detail.lowHI+' + '+(detail.capApplied==='hard'?'5.0':'3.0 + '+((detail.rawHcp-detail.lowHI-3)*0.5).toFixed(1))+'</div>';
        html+='<div style="font-family:Cormorant Garamond,serif;font-size:1.3rem;color:'+(detail.capApplied==='hard'?'#dc7846':'#c9a84c')+'">= '+hcp+'</div>';
        html+='</div></div>';
      }
      // Final
      html+='<div style="display:flex;justify-content:space-between;align-items:center;padding-top:10px;border-top:1px solid rgba(201,168,76,.2);margin-top:4px">';
      html+='<span style="font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:#4a7055">Handicap Index</span>';
      html+='<span style="font-family:Cormorant Garamond,serif;font-size:1.6rem;font-weight:700;color:#c9a84c">'+hcp+'</span>';
      html+='</div>';
      html+='</div>';
    }
    html+='</div>';
  }

  // ── Differentials list ───────────────────────────────────────────────────
  if(usedIds.length){
    html+='<div style="font-size:.65rem;color:#5a8068;margin-bottom:6px;text-align:center">Rounds marked ⭐ are counting towards your handicap</div>';
  }
  if(detail.exceptionalRounds&&detail.exceptionalRounds.length){
    html+='<div style="font-size:.65rem;color:#4094dc;margin-bottom:10px;text-align:center">⚡ Exceptional score — index reduction of '+detail.totalAdj+' applied</div>';
  }
  html+='<div class="sec-t" style="margin-bottom:13px">📉 Differentials</div><div class="card">';
  var sorted=S.rounds.slice().sort(function(a,b){return new Date(b.date)-new Date(a.date);});
  sorted.forEach(function(r){
    var d=r.grossScore-r.totalPar;
    var isUsed=usedIds.indexOf(r.id)!==-1;
    var isExcept=(r.exceptionAdj||0)!==0;
    html+='<div class="rrow" style="'+(isUsed?'background:rgba(201,168,76,.06);margin:0 -20px;padding:9px 20px;border-radius:8px;':'')+(isExcept?'background:rgba(64,148,220,.05);margin:0 -20px;padding:9px 20px;border-radius:8px;':'')+ '">';
    html+='<div style="display:flex;align-items:center;gap:7px">';
    if(isUsed) html+='<span style="font-size:.9rem">⭐</span>';
    if(isExcept) html+='<span style="font-size:.9rem" title="Exceptional score — index reduction applied">⚡</span>';
    html+='<div><div style="font-size:.88rem;color:#ede8dc;font-weight:500">'+esc(r.courseName)+'</div>';
    html+='<div style="font-size:.67rem;color:#5a8068">'+fmtD(r.date)+(r.numHoles===9?' · '+(r.half===0?'Front 9':'Back 9'):'')+'</div></div></div>';
    html+='<div style="display:flex;align-items:center;gap:14px">';
    html+='<div style="text-align:center"><div style="font-family:Cormorant Garamond,serif;font-size:1.3rem;font-weight:600;color:#ede8dc">'+r.grossScore+'</div>';
    html+='<div style="font-size:.6rem;color:'+(d<0?'#4094dc':d===0?'#5a8068':'#dc7846')+'">'+(d>0?'+':'')+d+'</div></div>';
    html+='<div style="text-align:center;min-width:38px"><div style="font-size:.82rem;font-weight:600;color:'+(isUsed?'#c9a84c':'#6a8a78')+'">'+(r.differential>0?'+':'')+r.differential+'</div>';
    html+='<div style="font-size:.55rem;color:#3a5642;text-transform:uppercase;letter-spacing:.06em">diff</div></div>';
    html+='</div></div>';
  });
  html+='</div>';
  return html;
}


// ── STATS TAB ────────────────────────────────────────────────────────────────
function buildStats(){
  if(!S.rounds.length){
    return '<div class="card"><div class="empty"><div class="empty-i">📊</div><div class="empty-t">No rounds yet.<br>Log some scorecards to see your stats.</div></div></div>';
  }

  var html='';

  // ── Trend chart ────────────────────────────────────────────────────────────
  html+='<div class="sec-t" style="margin-bottom:13px">📈 Handicap Trend</div>';
  html+='<div class="card" style="margin-bottom:20px">';
  // Build HI history by replaying rounds in date order
  var byDate=[].concat(S.rounds).sort(function(a,b){return new Date(a.date)-new Date(b.date);});
  var hiHistory=[];
  for(var i=2;i<byDate.length;i++){
    var slice=byDate.slice(0,i+1);
    var hi=calcHandicap(slice);
    if(hi!==null) hiHistory.push({date:byDate[i].date,hi:hi,label:fmtD(byDate[i].date)});
  }
  // Add current
  var curHI=calcHandicap(S.rounds);
  if(curHI!==null){
    var latest=[].concat(S.rounds).sort(function(a,b){return new Date(b.date)-new Date(a.date);})[0];
    hiHistory.push({date:latest.date,hi:curHI,label:fmtD(latest.date)});
  }
  // Remove duplicate dates (keep last)
  var seen={};
  hiHistory=hiHistory.filter(function(p){var k=p.date;if(seen[k])return false;seen[k]=true;return true;});

  if(hiHistory.length<2){
    html+='<div style="text-align:center;padding:20px;color:#3a5642;font-size:.84rem">Add more rounds to see your trend.</div>';
  } else {
    var minHI=Math.min.apply(null,hiHistory.map(function(p){return p.hi;}))-1;
    var maxHI=Math.max.apply(null,hiHistory.map(function(p){return p.hi;}))+1;
    var W=600,H=160,padL=32,padR=16,padT=12,padB=28;
    var xScale=function(i){return padL+(i/(hiHistory.length-1))*(W-padL-padR);};
    var yScale=function(v){return padT+(maxHI-v)/(maxHI-minHI)*(H-padT-padB);};
    // grid lines
    var gridVals=[];
    var step=Math.ceil((maxHI-minHI)/4);
    for(var gv=Math.ceil(minHI);gv<=Math.floor(maxHI);gv+=step) gridVals.push(gv);
    var svg='<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto;display:block" xmlns="http://www.w3.org/2000/svg">';
    // grid
    gridVals.forEach(function(gv){
      var gy=yScale(gv);
      svg+='<line x1="'+padL+'" y1="'+gy+'" x2="'+(W-padR)+'" y2="'+gy+'" stroke="rgba(255,255,255,.06)" stroke-width="1"/>';
      svg+='<text x="'+(padL-4)+'" y="'+(gy+4)+'" fill="#3a5642" font-size="9" text-anchor="end">'+gv+'</text>';
    });
    // area fill
    var pts=hiHistory.map(function(p,i){return xScale(i)+','+yScale(p.hi);}).join(' ');
    var firstX=xScale(0),lastX=xScale(hiHistory.length-1),baseY=H-padB;
    svg+='<polygon points="'+firstX+','+baseY+' '+pts+' '+lastX+','+baseY+'" fill="rgba(201,168,76,.08)"/>';
    // line
    var d='M'+hiHistory.map(function(p,i){return xScale(i)+' '+yScale(p.hi);}).join(' L');
    svg+='<path d="'+d+'" fill="none" stroke="#c9a84c" stroke-width="2" stroke-linejoin="round"/>';
    // dots + labels
    hiHistory.forEach(function(p,i){
      var cx=xScale(i),cy=yScale(p.hi);
      svg+='<circle cx="'+cx+'" cy="'+cy+'" r="3.5" fill="#c9a84c"/>';
    });
    // x axis labels — show first, last, and evenly spaced max 6
    var labelIdxs=[0,hiHistory.length-1];
    if(hiHistory.length>4){
      var step2=Math.floor(hiHistory.length/4);
      for(var li=step2;li<hiHistory.length-1;li+=step2) if(labelIdxs.indexOf(li)===-1) labelIdxs.push(li);
    }
    labelIdxs.sort(function(a,b){return a-b;});
    labelIdxs.forEach(function(i){
      var p=hiHistory[i];
      svg+='<text x="'+xScale(i)+'" y="'+(H-padB+14)+'" fill="#3a5642" font-size="8" text-anchor="middle">'+fmtD(p.date).replace(/ /g,' ')+'</text>';
    });
    svg+='</svg>';
    html+=svg;
    // min/max callout
    var minP=hiHistory.reduce(function(a,b){return b.hi<a.hi?b:a;});
    var maxP=hiHistory.reduce(function(a,b){return b.hi>a.hi?b:a;});
    html+='<div style="display:flex;gap:12px;margin-top:12px;justify-content:center">';
    html+='<div style="text-align:center;background:rgba(70,190,110,.08);border:1px solid rgba(70,190,110,.2);border-radius:8px;padding:8px 16px">';
    html+='<div style="font-family:Cormorant Garamond,serif;font-size:1.3rem;font-weight:700;color:#46be6e">'+minP.hi+'</div>';
    html+='<div style="font-size:.6rem;color:#3a5642;text-transform:uppercase;letter-spacing:.08em">Best ever</div></div>';
    html+='<div style="text-align:center;background:rgba(201,168,76,.06);border:1px solid rgba(201,168,76,.2);border-radius:8px;padding:8px 16px">';
    html+='<div style="font-family:Cormorant Garamond,serif;font-size:1.3rem;font-weight:700;color:#c9a84c">'+curHI+'</div>';
    html+='<div style="font-size:.6rem;color:#3a5642;text-transform:uppercase;letter-spacing:.08em">Current</div></div>';
    html+='</div>';
  }
  html+='</div>';

  // ── Par breakdown ──────────────────────────────────────────────────────────
  html+='<div class="sec-t" style="margin-bottom:13px">⛳ Par Breakdown</div>';
  html+='<div class="card" style="margin-bottom:20px">';
  // Gather all hole scores across all 18-hole rounds
  var par3scores=[],par4scores=[],par5scores=[];
  S.rounds.forEach(function(r){
    if((r.numHoles||18)!==18) return; // only 18-hole rounds for clean data
    var course=S.courses.find(function(c){return c.id===r.courseId;});
    if(!course) return;
    course.holes.forEach(function(hole,i){
      var s=r.holeScores[i]; if(!s||s<=0) return;
      var diff=s-hole.par;
      if(hole.par===3) par3scores.push(diff);
      else if(hole.par===4) par4scores.push(diff);
      else if(hole.par===5) par5scores.push(diff);
    });
  });
  function parStats(scores,par){
    if(!scores.length) return null;
    var avg=scores.reduce(function(a,b){return a+b;},0)/scores.length;
    var counts={eagle:0,birdie:0,par:0,bogey:0,double:0,worse:0};
    scores.forEach(function(d){
      if(d<=-2) counts.eagle++;
      else if(d===-1) counts.birdie++;
      else if(d===0) counts.par++;
      else if(d===1) counts.bogey++;
      else if(d===2) counts.double++;
      else counts.worse++;
    });
    return {avg:avg,counts:counts,total:scores.length,par:par};
  }
  var p3=parStats(par3scores,3),p4=parStats(par4scores,4),p5=parStats(par5scores,5);
  var parGroups=[{label:'Par 3',data:p3,col:'#4094dc'},{label:'Par 4',data:p4,col:'#c9a84c'},{label:'Par 5',data:p5,col:'#46be6e'}];
  parGroups.forEach(function(pg){
    if(!pg.data){
      html+='<div style="padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04);color:#3a5642;font-size:.8rem">'+pg.label+' — no data yet</div>';
      return;
    }
    var d=pg.data;
    html+='<div style="padding:12px 0;border-bottom:1px solid rgba(255,255,255,.04)">';
    html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">';
    html+='<div>';
    html+='<div style="font-family:Cormorant Garamond,serif;font-size:1rem;font-weight:600;color:'+pg.col+'">'+pg.label+'</div>';
    html+='<div style="font-size:.68rem;color:#5a8068">'+d.total+' holes played</div>';
    html+='</div>';
    var avgStr=d.avg>=0?'+'+d.avg.toFixed(2):d.avg.toFixed(2);
    var avgCol=d.avg<0?'#46be6e':d.avg<0.3?'#9abfaa':d.avg<0.8?'#dc7846':'#e06060';
    html+='<div style="text-align:right">';
    html+='<div style="font-family:Cormorant Garamond,serif;font-size:1.5rem;font-weight:700;color:'+avgCol+'">'+avgStr+'</div>';
    html+='<div style="font-size:.6rem;color:#3a5642;text-transform:uppercase;letter-spacing:.08em">avg vs par</div>';
    html+='</div></div>';
    // score distribution bar
    var order=[{k:'eagle',c:'#46be6e',l:'Eagle+'},{k:'birdie',c:'#4094dc',l:'Birdie'},{k:'par',c:'#9abfaa',l:'Par'},{k:'bogey',c:'#dc7846',l:'Bogey'},{k:'double',c:'#e06060',l:'Double'},{k:'worse',c:'#961919',l:'Worse'}];
    html+='<div style="display:flex;height:8px;border-radius:4px;overflow:hidden;gap:1px;margin-bottom:6px">';
    order.forEach(function(o){
      var pct=d.counts[o.k]/d.total*100;
      if(pct>0) html+='<div style="flex:'+pct+';background:'+o.c+'" title="'+o.l+': '+d.counts[o.k]+'"></div>';
    });
    html+='</div>';
    html+='<div style="display:flex;gap:6px;flex-wrap:wrap">';
    order.forEach(function(o){
      if(!d.counts[o.k]) return;
      var pct=(d.counts[o.k]/d.total*100).toFixed(0);
      html+='<div style="font-size:.62rem;color:'+o.c+'">'+o.l+' '+pct+'%</div>';
    });
    html+='</div></div>';
  });
  html+='</div>';

  return html;
}



function setPlannerClub(hole,val){S.plannerClubs['h'+hole]=val;render();}

// ── PLANNER TAB ───────────────────────────────────────────────────────────────
function buildPlanner(){
  var html='<div class="sec-t" style="margin-bottom:14px">Round Planner</div>';

  if(!S.courses.length){
    return html+'<div class="card"><div class="empty"><div class="empty-i">🏌️</div><div class="empty-t">Add a course first before using the planner.</div></div></div>';
  }

  // Course selector
  html+='<div style="margin-bottom:16px">';
  html+='<label class="lbl">Select Course</label>';
  html+='<select class="inp" onchange="S.plannerCourseId=this.value;S.plannerHole=0;S.plannerClubs={};render()">';
  html+='<option value="">— Choose a course —</option>';
  S.courses.forEach(function(c){
    html+='<option value="'+c.id+'"'+(S.plannerCourseId===c.id?' selected':'')+'>'+esc(c.name)+'</option>';
  });
  html+='</select></div>';

  if(!S.plannerCourseId) return html;

  var course=S.courses.find(function(c){return c.id===S.plannerCourseId;});
  if(!course) return html;

  // Get all rounds for this course to compute hole averages
  var courseRounds=S.rounds.filter(function(r){return r.courseId===course.id&&(r.numHoles||18)===18;});

  // Hole navigation tabs
  html+='<div style="overflow-x:auto;margin-bottom:16px"><div style="display:flex;gap:4px;min-width:max-content">';
  course.holes.forEach(function(hole,i){
    var active=S.plannerHole===i;
    html+='<button onclick="S.plannerHole='+i+';render()" style="padding:7px 11px;border-radius:8px;border:1px solid '+(active?'rgba(201,168,76,.5)':'rgba(255,255,255,.08)')+';background:'+(active?'linear-gradient(140deg,#193326,#0e1f14)':'transparent')+';color:'+(active?'#c9a84c':'#5a8068')+';font-family:DM Sans,sans-serif;font-size:.72rem;cursor:pointer;white-space:nowrap">';
    html+='H'+(i+1)+' <span style="font-size:.62rem;opacity:.7">P'+hole.par+'</span></button>';
  });
  html+='</div></div>';

  var h=course.holes[S.plannerHole];
  var holeNum=S.plannerHole+1;

  // Compute hole stats from history
  var holeScores=courseRounds.map(function(r){return r.holeScores[S.plannerHole]||0;}).filter(function(s){return s>0;});
  var holeAvg=holeScores.length?holeScores.reduce(function(a,b){return a+b;},0)/holeScores.length:null;
  var holeBest=holeScores.length?Math.min.apply(null,holeScores):null;
  var holeWorst=holeScores.length?Math.max.apply(null,holeScores):null;
  var scoreCounts={eagle:0,birdie:0,par:0,bogey:0,double:0,worse:0};
  holeScores.forEach(function(s){
    var d=s-h.par;
    if(d<=-2)scoreCounts.eagle++;
    else if(d===-1)scoreCounts.birdie++;
    else if(d===0)scoreCounts.par++;
    else if(d===1)scoreCounts.bogey++;
    else if(d===2)scoreCounts.double++;
    else scoreCounts.worse++;
  });

  // ── Hole header card ────────────────────────────────────────────────────────
  html+='<div class="card card-gold" style="margin-bottom:14px">';
  html+='<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px">';
  html+='<div>';
  html+='<div style="font-family:Cormorant Garamond,serif;font-size:1.8rem;font-weight:700;color:#c9a84c;line-height:1">Hole '+holeNum+'</div>';
  html+='<div style="font-size:.72rem;color:#5a8068;margin-top:4px">Par '+h.par+(h.distance?' · '+h.distance+'m':'')+' · SI '+h.si+'</div>';
  html+='</div>';
  if(holeAvg!==null){
    var avgDiff=holeAvg-h.par;
    var avgCol=avgDiff<0?'#46be6e':avgDiff<0.3?'#9abfaa':avgDiff<1?'#dc7846':'#e06060';
    html+='<div style="text-align:center;background:rgba(0,0,0,.2);border-radius:10px;padding:10px 16px">';
    html+='<div style="font-family:Cormorant Garamond,serif;font-size:1.6rem;font-weight:700;color:'+avgCol+'">'+holeAvg.toFixed(1)+'</div>';
    html+='<div style="font-size:.58rem;color:#3a5642;text-transform:uppercase;letter-spacing:.08em">your avg</div>';
    html+='</div>';
  }
  html+='</div>';
  // Stats row
  if(holeScores.length){
    html+='<div style="display:flex;gap:8px;margin-bottom:12px">';
    [
      {v:holeBest,l:'Best',c:'#46be6e'},
      {v:holeAvg?holeAvg.toFixed(1):null,l:'Average',c:'#c9a84c'},
      {v:holeWorst,l:'Worst',c:'#e06060'},
      {v:holeScores.length,l:'Rounds',c:'#9abfaa'}
    ].forEach(function(item){
      html+='<div style="flex:1;background:rgba(0,0,0,.2);border-radius:8px;padding:8px 4px;text-align:center">';
      html+='<div style="font-family:Cormorant Garamond,serif;font-size:1.2rem;font-weight:600;color:'+item.c+'">'+item.v+'</div>';
      html+='<div style="font-size:.56rem;color:#3a5642;text-transform:uppercase;letter-spacing:.07em">'+item.l+'</div>';
      html+='</div>';
    });
    html+='</div>';
    // Score distribution mini bar
    var order=[{k:'eagle',c:'#46be6e'},{k:'birdie',c:'#4094dc'},{k:'par',c:'#9abfaa'},{k:'bogey',c:'#dc7846'},{k:'double',c:'#e06060'},{k:'worse',c:'#961919'}];
    html+='<div style="display:flex;height:6px;border-radius:3px;overflow:hidden;gap:1px;margin-bottom:6px">';
    order.forEach(function(o){
      var pct=scoreCounts[o.k]/holeScores.length*100;
      if(pct>0) html+='<div style="flex:'+pct+';background:'+o.c+'"></div>';
    });
    html+='</div>';
    html+='<div style="display:flex;gap:8px;flex-wrap:wrap">';
    var labels={eagle:'Eagle+',birdie:'Birdie',par:'Par',bogey:'Bogey',double:'Double',worse:'Triple+'};
    order.forEach(function(o){
      if(!scoreCounts[o.k])return;
      html+='<div style="font-size:.62rem;color:'+o.c+'">'+labels[o.k]+' '+Math.round(scoreCounts[o.k]/holeScores.length*100)+'%</div>';
    });
    html+='</div>';
  } else {
    html+='<div style="font-size:.78rem;color:#3a5642">No rounds recorded on this hole yet.</div>';
  }
  html+='</div>';

  // ── Shot planner ────────────────────────────────────────────────────────────
  if(!h.distance){
    html+='<div class="card"><div style="text-align:center;padding:20px;color:#3a5642;font-size:.84rem">Add hole distance in the course settings to use the shot planner.</div></div>';
    return html;
  }

  var sortedBag=S.bag.filter(function(c){return c.distance>0;}).sort(function(a,b){return b.distance-a.distance;});
  if(!sortedBag.length){
    html+='<div class="card"><div style="text-align:center;padding:20px;color:#3a5642;font-size:.84rem">Add clubs with distances in the Bag tab to use the shot planner.</div></div>';
    return html;
  }

  var teeClubId=S.plannerClubs['h'+S.plannerHole]||'';
  var teeClub=teeClubId?sortedBag.find(function(c){return c.id===teeClubId;}):null;
  var remaining=teeClub?Math.max(0,h.distance-teeClub.distance):h.distance;

  // Find best club for remaining distance
  function bestClub(dist){
    if(!dist) return null;
    var sorted=sortedBag.slice().sort(function(a,b){return a.distance-b.distance;});
    // Find club whose carry is closest to and not more than dist
    var best=null;
    sorted.forEach(function(c){
      if(c.distance<=dist) best=c;
    });
    // If all clubs overshoot, pick shortest
    if(!best) best=sorted[0];
    return best;
  }

  // Tee shot card
  html+='<div class="card" style="margin-bottom:14px">';
  html+='<div style="font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:#4a7055;margin-bottom:12px">Tee Shot</div>';
  html+='<div style="margin-bottom:12px"><label class="lbl">Select Club</label>';
  html+='<select class="inp" onchange="setPlannerClub('+S.plannerHole+',this.value)">';
  html+='<option value="">\u2014 Choose a club \u2014</option>';
  sortedBag.forEach(function(c){
    html+='<option value="'+c.id+'"'+(teeClubId===c.id?' selected':'')+'>'+esc(c.club)+' ('+c.distance+'m)</option>';
  });
  html+='</select></div>';

  if(teeClub){
    var overshoot=teeClub.distance>h.distance;
    html+='<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px">';
    html+='<div style="background:rgba(0,0,0,.2);border-radius:8px;padding:10px;text-align:center">';
    html+='<div style="font-family:Cormorant Garamond,serif;font-size:1.3rem;font-weight:700;color:#c9a84c">'+h.distance+'m</div>';
    html+='<div style="font-size:.58rem;color:#3a5642;text-transform:uppercase;letter-spacing:.07em">hole</div></div>';
    html+='<div style="background:rgba(0,0,0,.2);border-radius:8px;padding:10px;text-align:center">';
    html+='<div style="font-family:Cormorant Garamond,serif;font-size:1.3rem;font-weight:700;color:#9abfaa">'+teeClub.distance+'m</div>';
    html+='<div style="font-size:.58rem;color:#3a5642;text-transform:uppercase;letter-spacing:.07em">carry</div></div>';
    html+='<div style="background:rgba(0,0,0,.2);border-radius:8px;padding:10px;text-align:center">';
    html+='<div style="font-family:Cormorant Garamond,serif;font-size:1.3rem;font-weight:700;color:'+(overshoot?'#e06060':'#ede8dc')+'">'+(overshoot?'Overshoot':remaining+'m')+'</div>';
    html+='<div style="font-size:.58rem;color:#3a5642;text-transform:uppercase;letter-spacing:.07em">remaining</div></div>';
    html+='</div>';
    // Visual distance bar
    var pct=Math.min(teeClub.distance/h.distance*100,100);
    html+='<div style="margin-bottom:4px"><div style="display:flex;justify-content:space-between;font-size:.62rem;color:#3a5642;margin-bottom:4px"><span>Tee</span><span>Pin</span></div>';
    html+='<div style="background:rgba(255,255,255,.04);border-radius:4px;height:8px;position:relative;overflow:hidden">';
    html+='<div style="width:'+pct.toFixed(1)+'%;height:100%;background:linear-gradient(90deg,#1a5c30,#c9a84c);border-radius:4px"></div>';
    if(!overshoot) html+='<div style="position:absolute;top:0;left:'+pct.toFixed(1)+'%;height:100%;width:2px;background:#4094dc"></div>';
    html+='</div></div>';
  }
  html+='</div>';

  // Second shot card (only if tee club selected and not overshoot)
  if(teeClub&&remaining>0){
    var suggested=bestClub(remaining);
    html+='<div class="card" style="margin-bottom:14px">';
    html+='<div style="font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:#4a7055;margin-bottom:12px">Approach Shot</div>';
    html+='<div style="font-size:.82rem;color:#5a8068;margin-bottom:14px">'+remaining+'m to the pin</div>';
    if(suggested){
      html+='<div style="display:flex;justify-content:space-between;align-items:center;background:rgba(201,168,76,.07);border:1px solid rgba(201,168,76,.2);border-radius:12px;padding:14px 16px;margin-bottom:12px">';
      html+='<div>';
      html+='<div style="font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:#4a7055;margin-bottom:4px">Suggested Club</div>';
      html+='<div style="font-family:Cormorant Garamond,serif;font-size:1.4rem;font-weight:700;color:#c9a84c">'+esc(suggested.club)+'</div>';
      html+='<div style="font-size:.7rem;color:#5a8068;margin-top:2px">Carries '+suggested.distance+'m</div>';
      html+='</div>';
      var diff2=remaining-suggested.distance;
      html+='<div style="text-align:center;padding:8px 14px;background:rgba(0,0,0,.2);border-radius:8px">';
      html+='<div style="font-family:Cormorant Garamond,serif;font-size:1.2rem;font-weight:600;color:'+(Math.abs(diff2)<5?'#46be6e':Math.abs(diff2)<15?'#c9a84c':'#dc7846')+'">'+(diff2>0?'+':'')+diff2+'m</div>';
      html+='<div style="font-size:.58rem;color:#3a5642;text-transform:uppercase;letter-spacing:.07em">'+(diff2===0?'exact':diff2>0?'short':'long')+'</div>';
      html+='</div></div>';
      // Show nearby clubs
      var nearby=sortedBag.filter(function(c){return c.id!==suggested.id&&Math.abs(c.distance-remaining)<=30;}).slice(0,3);
      if(nearby.length){
        html+='<div style="font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:#3a5642;margin-bottom:8px">Alternatives within 30m</div>';
        html+='<div style="display:flex;flex-direction:column;gap:6px">';
        nearby.forEach(function(c){
          var d2=remaining-c.distance;
          html+='<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:8px">';
          html+='<span style="font-size:.82rem;color:#9abfaa">'+esc(c.club)+'</span>';
          html+='<div style="text-align:right"><span style="font-size:.78rem;color:#5a8068">'+c.distance+'m</span>';
          html+='<span style="font-size:.72rem;color:#3a5642;margin-left:8px">'+(d2>0?'+':'')+d2+'m</span></div>';
          html+='</div>';
        });
        html+='</div>';
      }
    }
    html+='</div>';
  }

  // Layup option
  if(teeClub&&h.distance>200){
    html+='<div class="card" style="border-color:rgba(64,148,220,.15)">';
    html+='<div style="font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:#4094dc;margin-bottom:10px">Layup Option</div>';
    var layupTargets=[100,120,150];
    html+='<div style="font-size:.78rem;color:#5a8068;margin-bottom:10px">Best club to leave yourself a full approach:</div>';
    html+='<div style="display:flex;flex-direction:column;gap:6px">';
    layupTargets.forEach(function(target){
      var layupDist=h.distance-target;
      var layupClub=bestClub(layupDist);
      if(!layupClub)return;
      html+='<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 12px;background:rgba(64,148,220,.05);border:1px solid rgba(64,148,220,.12);border-radius:8px">';
      html+='<div><div style="font-size:.8rem;color:#ede8dc">'+esc(layupClub.club)+'</div>';
      html+='<div style="font-size:.66rem;color:#5a8068">'+layupClub.distance+'m carry → leaves '+target+'m</div></div>';
      var approachClub=bestClub(target);
      if(approachClub) html+='<div style="font-size:.72rem;color:#4094dc;text-align:right">then '+esc(approachClub.club)+'<br><span style="font-size:.62rem;color:#3a5642">into green</span></div>';
      html+='</div>';
    });
    html+='</div></div>';
  }

  return html;
}

// ── BAG TAB ───────────────────────────────────────────────────────────────────
function buildBag(){
  var sorted=S.bag.slice().sort(function(a,b){
    if(a.distance===0&&b.distance!==0)return 1;
    if(b.distance===0&&a.distance!==0)return-1;
    return b.distance-a.distance;
  });
  var maxD=Math.max.apply(null,S.bag.filter(function(c){return c.distance>0;}).map(function(c){return c.distance;}).concat([1]));
  var html='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:13px">';
  html+='<div class="sec-t">🎒 My Bag</div>';
  html+='<button class="btn btn-gold" onclick="S.showNewClub=true;render()">+ Add Club</button></div>';
  // dist chart
  if(S.bag.filter(function(c){return c.distance>0;}).length){
    html+='<div class="card" style="margin-bottom:13px">';
    html+='<div style="font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:#3a5642;margin-bottom:13px">Distance Chart</div>';
    sorted.filter(function(c){return c.distance>0;}).forEach(function(c){
      html+='<div class="dbar-row"><div class="dbar-lbl">'+esc(c.club)+'</div>';
      html+='<div class="dbar-track"><div class="dbar-fill" style="width:'+(c.distance/maxD*100).toFixed(1)+'%"></div></div>';
      html+='<div class="dbar-val">'+c.distance+'m</div></div>';
    });
    html+='</div>';
  }
  html+='<div class="card">';
  if(!sorted.length){
    html+='<div class="empty"><div class="empty-i">🏌️</div><div class="empty-t">No clubs yet.</div></div>';
  } else {
    sorted.forEach(function(c){
      html+='<div class="crow">';
      if(S.editingClub===c.id){
        html+='<input class="inp" id="ec-club" style="flex:2;padding:5px 8px;font-size:.8rem" value="'+esc(c.club)+'" placeholder="Club name">';

function setCHole(i,field,val){
  if(field==='par'){
    CF.holes[i].par=parseInt(val)||4;
    // Par changed via select — safe to rebuild (one-click action, no typing)
    var overlay=document.getElementById('modal-overlay');
    var scrollTop=overlay?overlay.scrollTop:0;
    var cfName=document.getElementById('cf-name'); if(cfName) CF.name=cfName.value;
    var cfLoc=document.getElementById('cf-loc');  if(cfLoc) CF.location=cfLoc.value;
    var cfCr=document.getElementById('cf-cr');    if(cfCr)  CF.courseRating=cfCr.value;
    var cfSr=document.getElementById('cf-sr');    if(cfSr)  CF.slopeRating=cfSr.value;
    buildCourseModal();
    if(overlay) overlay.scrollTop=scrollTop;
  } else if(field==='distance'){
    CF.holes[i].distance=parseInt(val)||0;
    // Just update the OUT/IN total cell — no rebuild, no focus loss
    var half=i<9?0:1, sl=half*9;
    var hs=CF.holes.slice(sl,sl+9);
    var de=document.getElementById('cf-dist-'+half);
    if(de){ var d=hs.reduce(function(a,h){return a+(h.distance||0);},0); de.textContent=d?d+'m':'—'; }
  } else if(field==='si'){
    CF.holes[i].si=parseInt(val)||i+1;
    // SI doesn't affect any totals — nothing to update in DOM
  }
}

function buildRoundModal(){

function onCourseSelect(val){ RF.courseId=val; RF.scores=Array(18).fill(''); buildRoundModal(); }
function setNumHoles(n){ RF.numHoles=n; RF.scores=Array(18).fill(''); buildRoundModal(); }
function setSelectedHalf(h){ RF.selectedHalf=h; RF.scores=Array(18).fill(''); buildRoundModal(); }
function setRS(i,val){
  RF.scores[i]=val;
  var course=S.courses.find(function(c){return c.id===RF.courseId;}); if(!course)return;
  var s=parseInt(val)||0, par=course.holes[i].par, d=s-par;
  var vsEl=document.getElementById('vs-'+i);
  if(vsEl){ vsEl.className=s?(d<0?'vs-neg':d>0?'vs-pos':'vs-ev'):'vs-ev'; vsEl.textContent=s?(d===0?'E':d>0?'+'+d:d):'—'; }
  var half=i<9?0:1, sl=half*9;
  var hsc=RF.scores.slice(sl,sl+9);
  var hst=hsc.reduce(function(a,s){return a+(parseInt(s)||0);},0);
  var hpar=course.holes.slice(sl,sl+9).reduce(function(a,h){return a+h.par;},0);
  var hvs=hst-hpar;
  var stEl=document.getElementById('sc-tot-'+half), vtEl=document.getElementById('vs-tot-'+half);
  if(stEl) stEl.textContent=hst||'—';
  if(vtEl){ vtEl.style.color=hvs<0?'#4094dc':hvs===0?'#5a8068':'#dc7846'; vtEl.textContent=hsc.some(function(s){return s;})?(hvs===0?'E':hvs>0?'+'+hvs:hvs):'—'; }
  updateRoundSummary(course);
  var btn=document.getElementById('btn-save-round');
  if(btn) btn.disabled=!RF.scores.some(function(s){return s;});
}
function updateRoundSummary(course){
  var is9=RF.numHoles===9, sl=is9?RF.selectedHalf*9:0, len=is9?9:18;
  var total=RF.scores.slice(sl,sl+len).reduce(function(a,s){return a+(parseInt(s)||0);},0);
  var par=course.holes.slice(sl,sl+len).reduce(function(a,h){return a+h.par;},0);
  var diff=total-par;
  var wdiff;
  if(is9){
    var nineHoleDiff=(total-course.courseRating/2)*113/course.slopeRating;
    var currentHI=calcHandicap(S.rounds);
    var expectedDiff=currentHI!==null?currentHI/2:nineHoleDiff;
    wdiff=Math.round((nineHoleDiff+expectedDiff)*10)/10;
  } else {
    wdiff=Math.round(((total-course.courseRating)*113/course.slopeRating)*10)/10;
  }
  var el=document.getElementById('rs-summary'); if(!el)return;
  if(!RF.scores.some(function(s){return s;})){ el.style.display='none'; return; }
  el.style.display='flex';
  el.innerHTML=[
    {v:total,l:'Total',c:'#ede8dc'},
    {v:par,l:'Par',c:'#5a8068'},
    {v:diff===0?'E':diff>0?'+'+diff:diff,l:'vs Par',c:diff<0?'#4094dc':diff===0?'#5a8068':'#dc7846'},
    {v:(wdiff>0?'+':'')+wdiff,l:'Differential',c:'#c9a84c'}
  ].map(function(item){
    return '<div style="text-align:center"><div style="font-family:Cormorant Garamond,serif;font-size:1.5rem;font-weight:600;color:'+item.c+'">'+item.v+'</div>'
      +'<div style="font-size:.58rem;color:#3a5642;text-transform:uppercase;letter-spacing:.1em">'+item.l+'</div></div>';
  }).join('');
}
function saveRound(){
  var course=S.courses.find(function(c){return c.id===RF.courseId;}); if(!course)return;
  RF.date=(document.getElementById('rf-date')&&document.getElementById('rf-date').value)||RF.date;
  var is9=RF.numHoles===9, sl=is9?RF.selectedHalf*9:0, len=is9?9:18;
  var scores=RF.scores.slice(sl,sl+len).map(function(s){return parseInt(s)||0;});
  var holePars=course.holes.slice(sl,sl+len).map(function(h){return h.par;});
  var holeDists=course.holes.slice(sl,sl+len).map(function(h){return h.distance;});
  var grossScore=scores.reduce(function(a,b){return a+b;},0);
  var totalPar=holePars.reduce(function(a,b){return a+b;},0);
  // Get current HI BEFORE adding this round (used for 9-hole expected score + exceptional check)
  var currentHI=calcHandicap(S.rounds);
  var diff;
  if(is9){
    // 2024 WHS: 9-hole differential + expected differential for the other 9 holes
    var nineHoleDiff=(grossScore-course.courseRating/2)*113/course.slopeRating;
    var expectedDiff=currentHI!==null?currentHI/2:nineHoleDiff; // fallback: double if no HI yet
    diff=Math.round((nineHoleDiff+expectedDiff)*10)/10;
  } else {
    diff=Math.round(((grossScore-course.courseRating)*113/course.slopeRating)*10)/10;
  }
  // Exceptional score check: if differential is 7+ strokes below current HI
  var exceptionAdj=0;
  if(currentHI!==null){
    var diffBelow=currentHI-diff;
    if(diffBelow>=10) exceptionAdj=-2;
    else if(diffBelow>=7) exceptionAdj=-1;
  }
  S.rounds.unshift({id:uid(),date:RF.date,courseId:course.id,courseName:course.name,
    courseRating:course.courseRating,slopeRating:course.slopeRating,
    numHoles:len,half:is9?RF.selectedHalf:null,
    holePars:holePars,holeDistances:holeDists,holeScores:scores,totalPar:totalPar,
    grossScore:grossScore,differential:diff,exceptionAdj:exceptionAdj});
  apiSave(); closeModal(); render();
}
function deleteRound(id){ S.rounds=S.rounds.filter(function(r){return r.id!==id;}); S.confirmDeleteRound=null; apiSave(); render(); }

function exportData(){
  var data={courses:S.courses,rounds:S.rounds,bag:S.bag};
  var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;
  a.download='golf_data_'+new Date().toISOString().slice(0,10)+'.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function exportCourses(){
  if(!S.courses.length){ alert('No courses to export yet.'); return; }
  var data={type:'golf_courses_export',version:1,courses:S.courses};
  var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;
  a.download='golf_courses_'+new Date().toISOString().slice(0,10)+'.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function importCourses(input){
  var file=input.files[0]; if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var data=JSON.parse(e.target.result);
      // Accept both a courses-only export and a full data export
      var incoming=data.courses||[];
      if(!incoming.length){ alert('No courses found in this file.'); return; }
      // Merge — skip courses with same name (case-insensitive) already in the app
      var existingNames=S.courses.map(function(c){return c.name.toLowerCase().trim();});
      var added=0, skipped=0;
      incoming.forEach(function(c){
        if(existingNames.indexOf(c.name.toLowerCase().trim())!==-1){ skipped++; return; }
        // Give imported course a fresh id to avoid collisions
        S.courses.push(Object.assign({},c,{id:uid()}));
        added++;
      });
      apiSave(); render();
      var msg=added+' course'+(added!==1?'s':'')+' imported';
      if(skipped) msg+=' · '+skipped+' skipped (already exist)';
      var note=document.createElement('div');
      note.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#193326;border:1px solid rgba(201,168,76,0.4);color:#c9a84c;padding:12px 24px;border-radius:10px;font-size:.84rem;z-index:999;font-family:DM Sans,sans-serif;white-space:nowrap';
      note.textContent=msg;
      document.body.appendChild(note);
      setTimeout(function(){document.body.removeChild(note);},3500);
    } catch(err){
      alert('Could not read file. Make sure it is a valid course export.');
    }
    input.value='';
  };
  reader.readAsText(file);
}

function importData(input){
  var file=input.files[0]; if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var data=JSON.parse(e.target.result);
      if(!data.courses||!data.rounds||!data.bag){
        alert('Invalid file — make sure you are importing a golf tracker export.');
        return;
      }
      S.courses=data.courses;
      S.rounds=data.rounds;
      S.bag=data.bag;
      apiSave();
      render();
      // Show confirmation
      var note=document.createElement('div');
      note.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#193326;border:1px solid rgba(201,168,76,0.4);color:#c9a84c;padding:12px 24px;border-radius:10px;font-size:.84rem;z-index:999;font-family:DM Sans,sans-serif';
      note.textContent='Data imported successfully — '+data.rounds.length+' rounds, '+data.courses.length+' courses loaded.';
      document.body.appendChild(note);
      setTimeout(function(){document.body.removeChild(note);},3500);
    } catch(err){
      alert('Could not read file. Make sure it is a valid JSON export.');
    }

function openEditRound(id){
  var r=S.rounds.find(function(r){return r.id===id;}); if(!r)return;
  var course=S.courses.find(function(c){return c.id===r.courseId;});
  var validDate=(r.date&&r.date.match(/^\d{4}-\d{2}-\d{2}$/))?r.date:new Date().toISOString().slice(0,10);
  var numHoles=r.numHoles||18, half=r.half;
  var holes=course?course.holes:r.holePars.map(function(par,i){return {par:par,distance:(r.holeDistances||[])[i]||0,si:i+1};});
  var html='<div class="modal-t">Edit Scorecard<button class="btn-ghost btn" style="font-size:1.1rem;padding:4px 8px" onclick="closeModal()">X</button></div>';
  html+='<div style="font-family:Cormorant Garamond,serif;font-size:1rem;color:#9abfaa;margin-bottom:18px">'+esc(r.courseName)+'</div>';
  html+='<div style="margin-bottom:14px"><label class="lbl">Date Played</label>';
  html+='<input class="inp" id="er-date" type="date" value="'+validDate+'"></div>';
  html+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">';
  html+='<div><label class="lbl">Course Rating</label><input class="inp" id="er-cr" type="number" step="0.1" value="'+r.courseRating+'"></div>';
  html+='<div><label class="lbl">Slope Rating</label><input class="inp" id="er-sr" type="number" value="'+r.slopeRating+'"></div>';
  html+='</div>';
  html+='<div style="border-top:1px solid rgba(255,255,255,.05);padding-top:13px;margin-bottom:12px">';
  html+='<div style="font-size:.62rem;letter-spacing:.11em;text-transform:uppercase;color:#4a7055;margin-bottom:8px">';
  html+=numHoles===9?(half===0?'Front 9 Scores':'Back 9 Scores'):'Hole Scores';
  html+='</div>';
  var halves=numHoles===9?[half]:[0,1];
  halves.forEach(function(h){
    var sl=h*9, hs=holes.slice(sl,sl+9);
    var sc=numHoles===9?r.holeScores.slice(0,9):r.holeScores.slice(sl,sl+9);
    html+='<div class="half-lbl">'+(h===0?'Front 9':'Back 9')+'</div>';
    html+='<div class="sc-wrap"><table class="sc-t"><thead><tr><th class="lc">Hole</th>';
    hs.forEach(function(_,i){html+='<th class="hnum">'+(sl+i+1)+'</th>';});
    html+='<th class="tot">'+(h===0?'OUT':'IN')+'</th></tr></thead><tbody>';
    html+='<tr><td class="lc">Par</td>';
    hs.forEach(function(hole){html+='<td style="color:#9abfaa">'+hole.par+'</td>';});
    html+='<td class="tot">'+hs.reduce(function(a,hole){return a+hole.par;},0)+'</td></tr>';
    html+='<tr><td class="lc" style="color:#c9a84c">Score</td>';
    sc.forEach(function(s,i){
      html+='<td><input id="er-s-'+(sl+i)+'" class="sc-inp" type="number" min="1" max="15" value="'+(s||'')+'" placeholder=""></td>';
    });
    html+='<td class="tot">'+sc.reduce(function(a,s){return a+(s||0);},0)+'</td></tr>';
    html+='</tbody></table></div>';
  });
  html+='</div>';
  html+='<div style="display:flex;gap:8px;justify-content:flex-end">';
  html+='<button class="btn btn-ghost" onclick="closeModal()">Cancel</button>';
  html+='<button class="btn btn-gold" onclick="saveEditRound(this.dataset.id)" data-id="'+id+'">Save Changes</button>';
  html+='</div>';
  document.getElementById('modal-box').innerHTML=html;
  document.getElementById('modal-overlay').classList.add('open');
}

function saveEditRound(id){
  var r=S.rounds.find(function(r){return r.id===id;}); if(!r)return;
  var date=document.getElementById('er-date').value||r.date;
  var cr=parseFloat(document.getElementById('er-cr').value)||r.courseRating;
  var sr=parseInt(document.getElementById('er-sr').value)||r.slopeRating;
  var numHoles=r.numHoles||18, half=r.half;
  var startHole=numHoles===9?(half===0?0:9):0;
  var newScores=[];
  for(var i=0;i<numHoles;i++){
    var el=document.getElementById('er-s-'+(startHole+i));
    newScores.push(el?parseInt(el.value)||0:(r.holeScores[i]||0));
  }
  var grossScore=newScores.reduce(function(a,b){return a+b;},0);
  var totalPar=r.holePars.reduce(function(a,b){return a+b;},0);
  var currentHI=calcHandicap(S.rounds.filter(function(x){return x.id!==id;}));
  var is9=numHoles===9, diff;
  if(is9){
    var nineHoleDiff=(grossScore-cr/2)*113/sr;
    var expectedDiff=currentHI!==null?currentHI/2:nineHoleDiff;
    diff=Math.round((nineHoleDiff+expectedDiff)*10)/10;
  } else {
    diff=Math.round(((grossScore-cr)*113/sr)*10)/10;
  }
  var exceptionAdj=0;
  if(currentHI!==null){
    var diffBelow=currentHI-diff;
    if(diffBelow>=10) exceptionAdj=-2;
    else if(diffBelow>=7) exceptionAdj=-1;
  }
  S.rounds=S.rounds.map(function(x){
    if(x.id!==id) return x;
    return Object.assign({},x,{date:date,courseRating:cr,slopeRating:sr,
      holeScores:newScores,grossScore:grossScore,totalPar:totalPar,
      differential:diff,exceptionAdj:exceptionAdj});
  });
  apiSave(); closeModal(); render();
}

}
